name: "Daily Tech News Digest"

on:
  schedule:
    # 매일 아침 9시 (KST) = UTC 기준 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai feedparser

      - name: Run News Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python tools/news_generator.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/news/
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated daily tech news update"
            git push
            # Automatically trigger the GitHub Pages deployment
            gh workflow run pages-deploy.yml
          else
            echo "No changes to commit."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
