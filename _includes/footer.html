<footer class="foot">
  <div class="foot-inner">
    {% assign current_lang = page.lang | default: "ko" %}
    {% assign t = site.data[current_lang].footer %}
    <div class="foot-brand">
      <span class="foot-word">Hwan</span>
      <span class="foot-fine" style="margin-left: 8px;">· {{ t.slogan }}</span>
    </div>
    <div class="foot-social">
      <a class="icon-btn" href="{{ '/about/' | relative_url }}" aria-label="{{ t.resume }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
      </a>
      <a class="icon-btn" href="https://github.com/hwan3434" target="_blank" rel="noopener" aria-label="GitHub">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.9a3.4 3.4 0 0 0-.9-2.6c3-.3 6.1-1.5 6.1-6.6A5.1 5.1 0 0 0 19.9 5 4.8 4.8 0 0 0 19.8 1.4S18.4 1 15 3.3a13.4 13.4 0 0 0-7 0C4.6 1 3.2 1.4 3.2 1.4A4.8 4.8 0 0 0 3.1 5 5.1 5.1 0 0 0 1.7 8.4c0 5 3.1 6.3 6.1 6.6a3.4 3.4 0 0 0-.9 2.6V22"/></svg>
      </a>
      <a class="icon-btn" href="{{ '/feed.xml' | relative_url }}" aria-label="RSS">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
      </a>
    </div>
    <div class="foot-fine">© {{ site.time | date: '%Y' }} Hwan. All rights reserved.</div>
  </div>
</footer>
