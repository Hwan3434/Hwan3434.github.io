<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "ko" }}" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/colors_and_type.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <script>
    // Restore theme from localStorage before render
    var savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>
<body>
  <div id="root">
    {% include nav.html %}
    {{ content }}
    {% include footer.html %}
  </div>
  {% include search.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
