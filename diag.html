---
layout: default
---

<h1>Diagnostic</h1>
<p>Current URL: {{ page.url }}</p>
<p>Current Path: {{ page.path }}</p>

<ul>
{% for p in site.posts %}
  <li>
    <strong>{{ p.title }}</strong><br>
    URL: {{ p.url }}<br>
    Path: {{ p.path }}<br>
    Categories: {{ p.categories | join: ", " }}
  </li>
{% endfor %}
</ul>
